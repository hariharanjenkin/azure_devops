name: Docker Image Azure ACR Security Scan and Unit Test Pipeline

trigger:
  branches:
    include:
      - main

# pr:
#   branches:
#     include:
#       - main

variables:
  azureSubscription: 'Pipeline-azure-sub'      # Replace with your Azure DevOps service connection name
  azureContainerRegistry: 'pipelineb214'             # Replace with your ACR name
  ServiceConnectioncontainerregistry: 'pipeline-container-registry' # Replace with your containerregistry Service connection name
  acrLoginServer: '$(azureContainerRegistry).azurecr.io'
  imageName: 'cicd-demo-app'
  imageTag: '$(Build.BuildId)'
  resourceGroup: 'example-resources'                # Replace with your Azure resource group
  containerGroup: 'cicd-demo-app-group'
  location: 'Central India'

stages:
- stage: Build
  displayName: Build Stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self
      - task: Docker@2
        displayName: Build Docker image
        inputs:
          command: build
          buildContext: azure-pipelines/
          Dockerfile: Dockerfile
          tags: |
            $(imageName):$(imageTag)

- stage: Test
  displayName: Test Stage
  dependsOn: Build
  jobs:
  - job: UnitTests
    displayName: Unit Tests
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self
      - script: |
          echo "Running unit tests..."
          # Add your test commands here, for example:
          # npm install
          # npm test
        displayName: Run Unit Tests

- stage: SecurityScan
  displayName: Security Scan Stage
  dependsOn: Test
  jobs:
  - job: Scan
    displayName: Security Scan
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self

      - script: |
          echo "Building Docker image with proper tag..."
          docker build -t $(imageName):$(imageTag) -f Dockerfile .

      # Verify image exists
      - script: |
          echo "Listing Docker images..."
          docker images
        displayName: Verify Image Exists

      # Install Trivy
      - script: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
        displayName: Install Trivy

      # Scan image
      - script: |
          trivy image --scanners vuln --severity HIGH,CRITICAL --exit-code 0 $(imageName):$(imageTag)
        displayName: Run Trivy Scan

- stage: BuildAndPush
  jobs:
  - job: BuildPush
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self

      - task: Docker@2
        displayName: Build and Push
        inputs:
          command: buildAndPush
          repository: $(imageName)
          dockerfile: Dockerfile
          containerRegistry: $(ServiceConnectioncontainerregistry)
          tags: |
            $(imageTag)
            latest
